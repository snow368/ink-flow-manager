name = "ink-flow-api"
compatibility_date = "2025-12-01"
main = "src/index.ts"
account_id = "76a99ad37a968c6e5f743d8bb27825b3"

# R2 bucket for image storage
[[r2_buckets]]
binding = "INKFLOW_IMAGES"
bucket_name = "inkflow-images"

# D1 database (replaces JSON files)
[[d1_databases]]
binding = "DB"
database_name = "inkflow-db"
database_id = "5e462ed0-9613-4e16-85c4-8bb0494c5f4a"

# Environment variables
[vars]
STRIPE_PLATFORM_FEE_PERCENT = "0"
VAPID_SUBJECT = "mailto:hello@ink-flows.com"
PUBLIC_URL = "https://ink-flow-api.snow368.workers.dev"
SENDGRID_API_KEY = ""
EMAIL_FROM = "hello@ink-flows.com"
