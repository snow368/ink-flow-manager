name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npx vitest run

  deploy:
    needs: test
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run build
      - name: Check Token
        run: |
          echo "Token length: ${#CLOUDFLARE_API_TOKEN}"
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then echo "MISSING"; else echo "OK"; fi
      - name: Install Wrangler
        run: npm install -g wrangler
      - name: Deploy Pages (frontend)
        run: wrangler pages deploy dist/ --project-name ink-flow
      - name: Install Worker deps
        run: cd workers && npm ci
      - name: Deploy Worker (API)
        run: cd workers && wrangler deploy
