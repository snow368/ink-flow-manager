<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="InkFlow" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />

    <!-- SEO: meta title + description (核心关键词前置) -->
    <title>InkFlow — Tattoo Studio Management Software</title>
    <meta name="description" content="Free tattoo studio management with online booking, portfolio, POS, payments, and client CRM. Trusted by 500+ tattoo artists worldwide." />
    <meta name="keywords" content="tattoo studio management, tattoo booking software, tattoo client CRM, tattoo POS, tattoo studio software" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://inkflow.com/" />

    <!-- Open Graph (OG) — 社交分享 -->
    <meta property="og:title" content="InkFlow — Tattoo Studio Management Software" />
    <meta property="og:description" content="Free tattoo studio management with online booking, portfolio, POS, payments, and client CRM. Trusted by 500+ tattoo artists worldwide." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://inkflow.com/" />
    <meta property="og:image" content="https://inkflow.com/og-image.png" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="InkFlow" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="InkFlow — Tattoo Studio Management Software" />
    <meta name="twitter:description" content="Free tattoo studio management with online booking, portfolio, POS, payments, and client CRM." />
    <meta name="twitter:image" content="https://inkflow.com/og-image.png" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://api.innkflow.com" />

    <style>
      @keyframes inkflow-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
