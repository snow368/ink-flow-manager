    <line x1="40" y1="25" x2="40" y2="50" stroke="url(#acc)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="40" cy="60" r="3" fill="url(#acc)"/>
  </g>
  <text x="80" y="160" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="700" fill="#ffffff">Tattoo Aftercare Issues</text>
  <text x="82" y="215" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#f0a35e">Spot problems early — heal safely</text>
