<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="Color tattoo aftercare hero">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b10"/>
      <stop offset="1" stop-color="#15131f"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0a35e"/>
      <stop offset="1" stop-color="#e07a4f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#f0a35e" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#f0a35e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#glow)"/>
  <g fill="none" stroke="url(#acc)" stroke-width="3" opacity="0.9">
    <path d="M150 520 C 320 360, 520 360, 700 470 S 980 520, 1080 430" stroke-linecap="round"/>
  </g>
  <g fill="url(#acc)" opacity="0.85">
    <circle cx="700" cy="300" r="6"/>
    <circle cx="840" cy="250" r="5"/>
  </g>
  <!-- Color splash icons -->
  <g transform="translate(300,300)">
    <circle cx="0" cy="0" r="45" fill="none" stroke="url(#acc)" stroke-width="2" opacity="0.5"/>
    <circle cx="60" cy="-30" r="30" fill="none" stroke="url(#acc)" stroke-width="2" opacity="0.35"/>
    <circle cx="-40" cy="40" r="25" fill="none" stroke="url(#acc)" stroke-width="2" opacity="0.25"/>
  </g>
  <text x="80" y="160" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="700" fill="#ffffff">Color Tattoo Aftercare</text>
  <text x="82" y="215" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#f0a35e">Keep the vibrancy — heal right</text>
</svg>
